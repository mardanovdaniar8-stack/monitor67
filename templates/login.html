<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход · Монитор67</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/tracker.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="card" style="max-width:400px; width:100%;">
        <div class="auth-brand">
            <h1>Монитор67</h1>
            <p>Учёт рабочего времени и задач</p>
        </div>
        <form method="POST">
            <div class="input-group">
                <label>ID организации</label>
                <input type="text" name="org_id" placeholder="Например, 1" inputmode="numeric" required>
            </div>
            <div class="input-group">
                <label>Логин</label>
                <input type="text" name="login" placeholder="Введите логин" autocomplete="username" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn" style="width:100%; justify-content:center;">Войти</button>
        </form>
        <div style="margin-top:16px;">
            <a href="/register" class="btn btn-outline" style="width:100%; justify-content:center;">Создать организацию</a>
        </div>
    </div>
</body>
</html>
