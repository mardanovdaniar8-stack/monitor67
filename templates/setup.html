<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка · Work Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/tracker.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .setup-card { max-width: 500px; width: 100%; }
    </style>
</head>
<body>
    <div class="card setup-card">
        <h2 style="text-align:center;">Создание организации</h2>
        <p class="text-secondary" style="text-align:center; margin-bottom:24px;">Это первый запуск системы</p>
        <form method="POST">
            <div class="input-group">
                <label>Название организации</label>
                <input type="text" name="org_name" placeholder="Например, ООО «Ромашка»" required>
            </div>
            <hr style="margin:24px 0; border:0; border-top:1px solid var(--border-light);">
            <h3 style="margin-bottom:16px;">Администратор</h3>
            <div class="input-group">
                <label>Имя</label>
                <input type="text" name="first_name" placeholder="Иван" required>
            </div>
            <div class="input-group">
                <label>Фамилия</label>
                <input type="text" name="last_name" placeholder="Иванов" required>
            </div>
            <div class="input-group">
                <label>Логин</label>
                <input type="text" name="login" placeholder="admin" required>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Создать и войти</button>
        </form>
    </div>
</body>
</html>
